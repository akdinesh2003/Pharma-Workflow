<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Pharma Workflow</h2>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        Dashboard
      </a>
      <a routerLink="/transactions" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        All Requests
      </a>
      <a routerLink="/transactions/create" routerLinkActive="active">
        New Request
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="currentUser$ | async as user">
        <p><strong>{{ user.fullName }}</strong></p>
        <p class="user-role">{{ user.role }}</p>
      </div>
      <button class="btn btn-secondary btn-block" (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Initiate New Request</h1>
      <p>Create a new pharmaceutical workflow request</p>
    </div>

    <div class="card form-card">
      <form (ngSubmit)="onSubmit()" #transactionForm="ngForm">
        <div class="form-group">
          <label for="drugName">Drug Name *</label>
          <input 
            type="text" 
            id="drugName" 
            name="drugName"
            class="form-control" 
            [(ngModel)]="request.drugName"
            required
            placeholder="e.g., Paracetamol 500mg">
        </div>

        <div class="form-group">
          <label for="batchNo">Batch Number *</label>
          <input 
            type="text" 
            id="batchNo" 
            name="batchNo"
            class="form-control" 
            [(ngModel)]="request.batchNo"
            required
            placeholder="e.g., PCM2026B01">
        </div>

        <div class="form-group">
          <label for="requestedBy">Requested By *</label>
          <input 
            type="text" 
            id="requestedBy" 
            name="requestedBy"
            class="form-control" 
            [(ngModel)]="request.requestedBy"
            required
            readonly>
        </div>

        <div class="form-group">
          <label for="comments">Comments</label>
          <textarea 
            id="comments" 
            name="comments"
            class="form-control" 
            [(ngModel)]="request.comments"
            placeholder="Add any additional comments..."></textarea>
        </div>

        <div *ngIf="errorMessage" class="alert alert-error">
          {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="alert alert-success">
          {{ successMessage }}
        </div>

        <div class="form-actions">
          <button 
            type="submit" 
            class="btn btn-primary"
            [disabled]="isLoading || !transactionForm.valid">
            {{ isLoading ? 'Creating...' : 'Create Request' }}
          </button>
          <button 
            type="button" 
            class="btn btn-secondary"
            routerLink="/transactions"
            [disabled]="isLoading">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </main>
</div>
